.client-table th { padding: 10px 12px; text-align: left; font-weight: 700; color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid #e5e5e5; background: #f8f7f5; position: sticky; top: 0; z-index: 1; }
.client-table th.right, .client-table td.right { text-align: right; }

.kpi-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 800; }

.pagination { display: flex; gap: 4px; align-items: center; justify-content: center; margin-top: 16px; }
.pagination button { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 12px; cursor: pointer; font-family: inherit; }
.pagination button.active { background: #d14718; color: #fff; border-color: #d14718; }

.export-btn:hover { background: #d14718; color: #fff; }

.matrix-table th { padding: 8px 10px; text-align: right; font-weight: 700; color: #888; font-size: 10px; text-transform: uppercase; background: #f8f7f5; border-bottom: 2px solid #e5e5e5; }

.matrix-table .total-row { background: #f0efed; font-weight: 700; }
.matrix-table .total-col { font-weight: 700; background: rgba(209,71,24,0.04); }

    /* Side Panel */
    .side-panel-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    .side-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 90vw;
      background: #fff; z-index: 1001; overflow-y: auto;
      box-shadow: -8px 0 40px rgba(0,0,0,0.15);
      animation: slideIn 0.25s ease;
      padding: 0;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .side-panel-header {
      position: sticky; top: 0; background: #fff;
      border-bottom: 2px solid #d14718;
      padding: 20px 24px; z-index: 1;
    }
    .side-panel-close {
      position: absolute; top: 16px; right: 16px;
      background: #f5f5f5; border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .side-panel-close:hover { background: #e0e0e0; }
    .side-panel-body { padding: 24px; }
    .sp-section { margin-bottom: 20px; }
    .sp-section-title {

    .sp-bar { height: 20px; border-radius: 4px; min-width: 2px; transition: width 0.3s; }

  const [selContract, setSelContract] = useState("mixte");
  const [customAmount, setCustomAmount] = useState("");
  const [selOptions, setSelOptions] = useState([]);
  const [renewEntries, setRenewEntries] = useState([]);
  const [selRenewContract, setSelRenewContract] = useState("mixte");
  const [customRenewAmount, setCustomRenewAmount] = useState("");
  const [selRenewOptions, setSelRenewOptions] = useState([]);

  const [customRenew3Amount, setCustomRenew3Amount] = useState("");
  const [selRenew3Options, setSelRenew3Options] = useState([]);
  const [fixe, setFixe] = useState(2708);
  const [simNewPerMonth, setSimNewPerMonth] = useState(12000);
  const [simRenewStart, setSimRenewStart] = useState(0);
  const [simRenewGrowth, setSimRenewGrowth] = useState(0);
  const [simRenew3Start, setSimRenew3Start] = useState(0);
  const [simRenew3Growth, setSimRenew3Growth] = useState(0);

  const toggleOpt = (optId, list, setter) => {
    setter(list.includes(optId) ? list.filter(o => o !== optId) : [...list, optId]);
  };

  const addEntry = () => {
    const contract = CONTRACTS.find(c => c.id === selContract);
    const baseAmount = contract.custom ? Number(customAmount) || 0 : contract.amount;
    const optTotal = selOptions.reduce((s, oid) => s + (OPTIONS.find(o => o.id === oid)?.amount || 0), 0);

    setEntries([...entries, { id: uid(), contract: contract.label, baseAmount, options: selOptions.map(oid => OPTIONS.find(o => o.id === oid)).filter(Boolean), optTotal, total: baseAmount + optTotal, commission: (baseAmount + optTotal) * 0.1 }]);
    setSelOptions([]); setCustomAmount("");

  const addRenew = () => {
    const contract = CONTRACTS.find(c => c.id === selRenewContract);
    const baseAmount = contract.custom ? Number(customRenewAmount) || 0 : contract.amount;
    const optTotal = selRenewOptions.reduce((s, oid) => s + (OPTIONS.find(o => o.id === oid)?.amount || 0), 0);

}

function ClientsTab() {
  const data = DASHBOARD_DATA;
  const [view, setView] = useState("overview");
  const [search, setSearch] = useState("");
  const [sortKey, setSortKey] = useState("ca_ht");
  const [sortAsc, setSortAsc] = useState(false);
  const [filterEx, setFilterEx] = useState("all");
  const [page, setPage] = useState(0);
  const [selectedClient, setSelectedClient] = useState(null);
  const perPage = 50;

  const toggleSort = (key) => {
    if (sortKey === key) setSortAsc(!sortAsc);
    else { setSortKey(key); setSortAsc(false); }
  };

  const filteredClients = useMemo(() => {
    let list = [...data.clients];
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(s) || c.id.toLowerCase().includes(s));
    }
    if (filterEx !== "all") {
      if (filterEx === "fidele") list = list.filter(c => (c.months_active || c.nb_ex) >= 3);
      else if (filterEx === "recurrent") list = list.filter(c => (c.months_active || c.nb_ex) === 2);
      else if (filterEx === "ponctuel") list = list.filter(c => (c.months_active || c.nb_ex) <= 1);
    }
    list.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    return list;
  }, [data.clients, search, filterEx, sortKey, sortAsc]);

  const pageClients = filteredClients.slice(page * perPage, (page + 1) * perPage);
  const totalPages = Math.ceil(filteredClients.length / perPage);

  const totalCA = data.exercice_summary.reduce((s, e) => s + e.ca_ht, 0);
  const lastEx = data.exercice_summary[data.exercice_summary.length - 1];
  const prevEx = data.exercice_summary.length > 1 ? data.exercice_summary[data.exercice_summary.length - 2] : null;
  const variation = prevEx ? (lastEx.ca_ht - prevEx.ca_ht) / prevEx.ca_ht : null;
  const nbFideles = data.clients.filter(c => (c.months_active || c.nb_ex) >= 3).length;
  const nbRecurrents = data.clients.filter(c => (c.months_active || c.nb_ex) === 2).length;
  const nbPonctuels = data.clients.filter(c => (c.months_active || c.nb_ex) <= 1).length;

  const maxMonthCA = Math.max(...data.monthly.map(m => m.ca_ht));

  const exportCSV = () => {
    const headers = ["Compte", "Client", "Produit", "Nb Exercices", "Nb Factures", "CA HT Total", ...data.exercices, "Première Facture", "Dernière Facture"];
    const rows = filteredClients.map(c => [c.id, c.name, c.produit, c.months_active || c.nb_ex, c.nb_factures, c.ca_ht, ...data.exercices.map(ex => (c.exercices && c.exercices[ex]) || c[ex] || 0), c.first, c.last]);
    const csv = [headers.join(";"), ...rows.map(r => r.join(";"))].join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "pmebtp_clients.csv"; a.click();
  };

  return (
    <div>
      {selectedClient && (
        <>
          <div className="side-panel-overlay" onClick={() => setSelectedClient(null)} />
          <div className="side-panel">
            <div className="side-panel-header">
              <button className="side-panel-close" onClick={() => setSelectedClient(null)}>×</button>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#d14718", marginBottom: 4 }}>
                {(selectedClient.months_active || selectedClient.nb_ex) >= 3 ? "Client Fidèle" : (selectedClient.months_active || selectedClient.nb_ex) === 2 ? "Client Récurrent" : "Client Ponctuel"}
              </div>
              <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 22, fontWeight: 700, color: "#111", lineHeight: 1.2 }}>
                {selectedClient.name}
              </div>
              <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>Compte {selectedClient.id}</div>
            </div>
            <div className="side-panel-body">
              <div className="sp-section">
                <div className="sp-section-title">Chiffre d'affaires</div>
                <div className="sp-row"><span className="sp-row-label">CA HT Total</span><span className="sp-row-value" style={{ color: "#d14718", fontSize: 18, fontFamily: "'Inter', sans-serif" }}>{fmt(selectedClient.ca_ht)}</span></div>
                <div className="sp-row"><span className="sp-row-label">CA TTC Total</span><span className="sp-row-value">{fmt(selectedClient.ca_ttc)}</span></div>
                <div className="sp-row"><span className="sp-row-label">Panier moyen HT</span><span className="sp-row-value">{fmt(selectedClient.ca_ht / selectedClient.nb_factures)}</span></div>
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Historique par exercice</div>
                <div className="sp-bar-container">
                  {data.exercices.map(ex => {
                    const val = selectedClient[ex] || 0;
                    const maxEx = Math.max(...data.exercices.map(e => selectedClient[e] || 0), 1);
                    const pct = (val / maxEx) * 100;
                    return (
                      <div key={ex} className="sp-bar-row">
                        <div style={{ fontSize: 11, color: "#666", minWidth: 72, fontWeight: 600 }}>{ex}</div>
                        <div style={{ flex: 1, background: "#f0f0f0", borderRadius: 4, height: 22, position: "relative" }}>
                          <div className="sp-bar" style={{ width: pct + "%", background: val > 0 ? "#d14718" : "transparent", height: 22, display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 8 }}>
                            {val > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: pct > 40 ? "#fff" : "#d14718", position: pct > 40 ? "relative" : "absolute", right: pct > 40 ? 0 : -60 }}>{fmt(val)}</span>}
                          </div>
                        </div>
                        {val === 0 && <span style={{ fontSize: 11, color: "#ccc", marginLeft: 4 }}>—</span>}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Détails</div>

              <div className="sp-section">
                <div className="sp-section-title">Évolution</div>
                {(() => {
                  const exVals = data.exercices.map(ex => ({ ex, val: (selectedClient.exercices && selectedClient.exercices[ex]) || selectedClient[ex] || 0 }));
                  const active = exVals.filter(e => e.val > 0);
                  if (active.length < 2) return <div style={{ fontSize: 12, color: "#888" }}>Pas assez de données pour calculer la tendance</div>;

                {selectedClient.invoices && selectedClient.invoices.length > 0 ? (

                          <th style={{ padding: "6px 8px", textAlign: "left", fontSize: 10, textTransform: "uppercase", color: "#888", fontWeight: 700 }}>Libellé</th>
                        </tr>
                      </thead>
                      <tbody>
                        {selectedClient.invoices.map((inv, idx) => (
                          <tr key={idx} style={{ borderBottom: "1px solid #f0f0f0" }}>

                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// Error Boundary
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error("React error:", error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", { style: { padding: 40, textAlign: "center" } },
        React.createElement("h2", { style: { color: "#d14718" } }, "Erreur de rendu"),
        React.createElement("pre", { style: { fontSize: 12, color: "#666", whiteSpace: "pre-wrap" } }, String(this.state.error))
      );
    }
    return this.props.children;
  }
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [mainTab, setMainTab] = useState("clients");

  return (
    <div>
      <div style={{ background: "#fff", borderBottom: "1px solid #e5e5e5", padding: "12px 24px" }}>
        <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <p style={{ fontSize: 12, color: "#999", fontWeight: 500 }}>Tableau de bord interne — Clients, CA & Primes</p>
          <div style={{ display: "flex", gap: 4, background: "#f0efed", borderRadius: 8, padding: 3 }}>
            {[{ key: "clients", label: "Clients & CA" }, { key: "primes", label: "Primes" }, { key: "tresorerie", label: "Trésorerie" }, { key: "compta", label: "Comptabilité" }, { key: "finances", label: "Finances" }].map(t => (
              <button key={t.key} onClick={() => setMainTab(t.key)} style={{
                padding: "8px 20px", borderRadius: 6, border: "none",
                background: mainTab === t.key ? "#fff" : "transparent",
                color: mainTab === t.key ? "#d14718" : "#888",
                fontSize: 13, fontWeight: 700, cursor: "pointer",
                boxShadow: mainTab === t.key ? "0 1px 4px rgba(0,0,0,0.06)" : "none",
              }}>{t.label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 24px 40px" }}>
        {mainTab === "clients" && <ClientsTab />}
        {mainTab === "primes" && <PrimesTab />}
        {mainTab === "tresorerie" && <TresorerieTab />}
        {mainTab === "compta" && <ComptaTab />}
        {mainTab === "finances" && (
          <div style={{ margin: "-20px -24px -40px", overflow: "hidden" }}>
            <iframe src="/kaki-dashboard.html?embed=1" style={{ width: "100%", height: "calc(100vh - 120px)", border: "none" }}></iframe>
          </div>
        )}
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px 32px", textAlign: "center" }}>
        <p style={{ fontSize: 11, color: "#ccc" }}>PMEBTP — Dashboard interne · Données FEC 2022-2025 · Outil interne</p>
      </div>
    </div>
  );
}

ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById("root"));
</script>
