<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf9f7; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #1a1a1a; }
select:focus, input:focus { outline: none; border-color: #d14718 !important; }
::placeholder { color: #bbb; }
input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #e5e5e5; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #d14718; cursor: pointer; border: 3px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
.search-input { padding: 8px 12px; border-radius: 6px; border: 1.5px solid #ddd; font-size: 13px; font-family: inherit; width: 100%; }
.client-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.client-table th { padding: 10px 12px; text-align: left; font-weight: 700; color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid #e5e5e5; background: #f8f7f5; position: sticky; top: 0; z-index: 1; }
.client-table th.right, .client-table td.right { text-align: right; }
.client-table td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
.client-table tr:hover { background: rgba(209,71,24,0.03); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
.badge-fidele { background: #e2efda; color: #2d6a4f; }
.badge-recurrent { background: #fff2cc; color: #b8860b; }
.badge-ponctuel { background: #fce4ec; color: #c62828; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 24px; }
.kpi-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px 16px; text-align: center; }
.kpi-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 800; }
.kpi-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
.bar-chart { display: flex; gap: 3px; align-items: flex-end; height: 200px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.bar-label { font-size: 9px; color: #999; margin-top: 4px; font-weight: 600; }
.bar-value { font-size: 9px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
.tab-btn { padding: 7px 16px; border-radius: 6px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { background: #fff; color: #d14718; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.tab-btn:not(.active) { background: transparent; color: #888; }
.pagination { display: flex; gap: 4px; align-items: center; justify-content: center; margin-top: 16px; }
.pagination button { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 12px; cursor: pointer; font-family: inherit; }
.pagination button.active { background: #d14718; color: #fff; border-color: #d14718; }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.export-btn { padding: 6px 14px; border-radius: 6px; border: 1.5px solid #d14718; background: transparent; color: #d14718; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
.export-btn:hover { background: #d14718; color: #fff; }
.matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.matrix-table th { padding: 8px 10px; text-align: right; font-weight: 700; color: #888; font-size: 10px; text-transform: uppercase; background: #f8f7f5; border-bottom: 2px solid #e5e5e5; }
.matrix-table td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #f0f0f0; }
.matrix-table .total-row { background: #f0efed; font-weight: 700; }
.matrix-table .total-col { font-weight: 700; background: rgba(209,71,24,0.04); }

    /* Side Panel */
    .side-panel-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.3); z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    .side-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 480px; max-width: 90vw;
      background: #fff; z-index: 1001; overflow-y: auto;
      box-shadow: -8px 0 40px rgba(0,0,0,0.15);
      animation: slideIn 0.25s ease;
      padding: 0;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .side-panel-header {
      position: sticky; top: 0; background: #fff;
      border-bottom: 2px solid #d14718;
      padding: 20px 24px; z-index: 1;
    }
    .side-panel-close {
      position: absolute; top: 16px; right: 16px;
      background: #f5f5f5; border: none; border-radius: 50%;
      width: 32px; height: 32px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .side-panel-close:hover { background: #e0e0e0; }
    .side-panel-body { padding: 24px; }
    .sp-section { margin-bottom: 20px; }
    .sp-section-title {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: #d14718; margin-bottom: 8px;
    }
    .sp-row {
      display: flex; justify-content: space-between; padding: 6px 0;
      border-bottom: 1px solid #f5f5f5; font-size: 13px;
    }
    .sp-row-label { color: #888; }
    .sp-row-value { font-weight: 600; color: #111; }
    .sp-bar-container { margin-top: 4px; }
    .sp-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sp-bar-label { font-size: 11px; color: "#666"; min-width: 80px; }
    .sp-bar { height: 20px; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
    .sp-bar-value { font-size: 12px; font-weight: 600; }

  </style>

                React.createElement("td", { style: { padding: "10px 12px", textAlign: "right", fontWeight: 700, color: solde >= 0 ? "#16a34a" : "#dc2626" } }, fmt(solde))
              );
            }),
            React.createElement("tr", { style: { borderTop: "2px solid #d14718", fontWeight: 800 } },
              React.createElement("td", { style: { padding: "10px 12px" } }, "TOTAL"),
              React.createElement("td", { style: { padding: "10px 12px", textAlign: "right", color: "#16a34a" } }, fmt(bank.total_encaisse)),
              React.createElement("td", { style: { padding: "10px 12px", textAlign: "right" } }, bank.nb_paiements),
              React.createElement("td", { style: { padding: "10px 12px", textAlign: "right", color: "#dc2626" } }, fmt(totalChargesHorsTransferts)),
              React.createElement("td", { style: { padding: "10px 12px", textAlign: "right", fontWeight: 800, color: bank.total_encaisse - totalChargesHorsTransferts >= 0 ? "#16a34a" : "#dc2626" } }, fmt(bank.total_encaisse - totalChargesHorsTransferts))
            )
          )
        )
      ),
      React.createElement("p", { style: { fontSize: 11, color: "#999", marginTop: 8 } }, "* Charges hors transferts internes et placements")
    ),
    
    // Top charges categories
    React.createElement("div", { style: cardStyle },
      React.createElement("h3", { style: { fontFamily: "'Inter', sans-serif", fontSize: 18, marginBottom: 16 } }, "Répartition des charges (8 mois)"),
      ...sortedCharges.map(([cat, val], i) => {
        const pct = (val / totalChargesHorsTransferts) * 100;
        return React.createElement("div", { key: i, style: { marginBottom: 8 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 2 } },
            React.createElement("span", { style: { fontWeight: 500 } }, cat),
            React.createElement("span", { style: { fontWeight: 600, color: "#666" } }, fmt(val) + " (" + pct.toFixed(1) + "%)")
          ),
          React.createElement("div", { style: { height: 6, background: "#f0f0f0", borderRadius: 3 } },
            React.createElement("div", { style: { height: 6, background: "#d14718", borderRadius: 3, width: pct + "%", opacity: 0.7 + (i === 0 ? 0.3 : 0) } })
          )
        );
      })
    ),
    
    // Source note
    React.createElement("p", { style: { fontSize: 11, color: "#aaa", textAlign: "center", marginTop: 8 } }, "Source : relevés bancaires " + bank.period + " — " + bank.transactions + " transactions analysées")
  );
}


function PrimesTab() {
  const [subTab, setSubTab] = useState("mensuel");
  const [entries, setEntries] = useState([]);
  const [selContract, setSelContract] = useState("mixte");
  const [customAmount, setCustomAmount] = useState("");
  const [selOptions, setSelOptions] = useState([]);
  const [renewEntries, setRenewEntries] = useState([]);
  const [selRenewContract, setSelRenewContract] = useState("mixte");
  const [customRenewAmount, setCustomRenewAmount] = useState("");
  const [selRenewOptions, setSelRenewOptions] = useState([]);
  const [renew3Entries, setRenew3Entries] = useState([]);
  const [selRenew3Contract, setSelRenew3Contract] = useState("mixte");
  const [customRenew3Amount, setCustomRenew3Amount] = useState("");
  const [selRenew3Options, setSelRenew3Options] = useState([]);
  const [fixe, setFixe] = useState(2708);
  const [simNewPerMonth, setSimNewPerMonth] = useState(12000);
  const [simRenewStart, setSimRenewStart] = useState(0);
  const [simRenewGrowth, setSimRenewGrowth] = useState(0);
  const [simRenew3Start, setSimRenew3Start] = useState(0);
  const [simRenew3Growth, setSimRenew3Growth] = useState(0);

  const toggleOpt = (optId, list, setter) => {
    setter(list.includes(optId) ? list.filter(o => o !== optId) : [...list, optId]);
  };

  const addEntry = () => {
    const contract = CONTRACTS.find(c => c.id === selContract);
    const baseAmount = contract.custom ? Number(customAmount) || 0 : contract.amount;
    const optTotal = selOptions.reduce((s, oid) => s + (OPTIONS.find(o => o.id === oid)?.amount || 0), 0);
    if (baseAmount === 0 && optTotal === 0) return;
    setEntries([...entries, { id: uid(), contract: contract.label, baseAmount, options: selOptions.map(oid => OPTIONS.find(o => o.id === oid)).filter(Boolean), optTotal, total: baseAmount + optTotal, commission: (baseAmount + optTotal) * 0.1 }]);
    setSelOptions([]); setCustomAmount("");
  };
  const addRenew = () => {
    const contract = CONTRACTS.find(c => c.id === selRenewContract);
    const baseAmount = contract.custom ? Number(customRenewAmount) || 0 : contract.amount;
    const optTotal = selRenewOptions.reduce((s, oid) => s + (OPTIONS.find(o => o.id === oid)?.amount || 0), 0);
    if (baseAmount === 0 && optTotal === 0) return;
    setRenewEntries([...renewEntries, { id: uid(), contract: contract.label, baseAmount, options: selRenewOptions.map(oid => OPTIONS.find(o => o.id === oid)).filter(Boolean), optTotal, total: baseAmount + optTotal, commission: (baseAmount + optTotal) * 0.05 }]);
    setSelRenewOptions([]); setCustomRenewAmount("");
  };

  const addRenew3 = () => {
    const contract = CONTRACTS.find(c => c.id === selRenew3Contract);
    const baseAmount = contract.custom ? Number(customRenew3Amount) || 0 : contract.amount;
    const optTotal = selRenew3Options.reduce((s, oid) => s + (OPTIONS.find(o => o.id === oid)?.amount || 0), 0);
    if (baseAmount === 0 && optTotal === 0) return;
    setRenew3Entries([...renew3Entries, { id: uid(), contract: contract.label, baseAmount, options: selRenew3Options.map(oid => OPTIONS.find(o => o.id === oid)).filter(Boolean), optTotal, total: baseAmount + optTotal, commission: (baseAmount + optTotal) * 0.03 }]);
    setSelRenew3Options([]); setCustomRenew3Amount("");
  };

  const newCA = entries.reduce((s, e) => s + e.total, 0);
  const newComm = entries.reduce((s, e) => s + e.commission, 0);
  const renewCA = renewEntries.reduce((s, e) => s + e.total, 0);
  const renewComm = renewEntries.reduce((s, e) => s + e.commission, 0);
  const renew3CA = renew3Entries.reduce((s, e) => s + e.total, 0);
  const renew3Comm = renew3Entries.reduce((s, e) => s + e.commission, 0);
  const totalComm = newComm + renewComm + renew3Comm;

  const simData = useMemo(() => {
    const months = []; let cumulRenew = simRenewStart; let cumulRenew3 = simRenew3Start; let totalNew = 0; let totalRenew = 0; let totalRenew3 = 0; let totalComm = 0;
    for (let i = 0; i < 12; i++) {
      const cN = simNewPerMonth * 0.1; const cR = cumulRenew * 0.05; const cR3 = cumulRenew3 * 0.03; const cT = cN + cR + cR3;
      totalNew += simNewPerMonth; totalRenew += cumulRenew; totalRenew3 += cumulRenew3; totalComm += cT;
      months.push({ month: MONTHS[i], newCA: simNewPerMonth, renewCA: cumulRenew, renew3CA: cumulRenew3, commNew: cN, commRenew: cR, commRenew3: cR3, commTotal: cT, brut: fixe + cT });
      cumulRenew += simRenewGrowth; cumulRenew3 += simRenew3Growth;
    }
    return { months, totalNew, totalRenew, totalRenew3, totalComm, annualVariable: totalComm, annualBrut: fixe * 12 + totalComm };
  }, [fixe, simNewPerMonth, simRenewStart, simRenewGrowth, simRenew3Start, simRenew3Growth]);

  const maxComm = Math.max(...simData.months.map(m => m.commTotal), 1);

  const EntryForm = ({ color, label, contract, setContract, custom, setCustom, opts, setOpts, onAdd }) => (
    <div style={{ marginBottom: 28 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 8, height: 8, borderRadius: "50%", background: color }} />{label}
      </div>
      <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 10, padding: 16, marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
          <select value={contract} onChange={e => setContract(e.target.value)} style={{ padding: "8px 12px", borderRadius: 6, border: "1.5px solid #ddd", fontSize: 13, fontFamily: "inherit", fontWeight: 600, minWidth: 180 }}>
            {CONTRACTS.map(c => <option key={c.id} value={c.id}>{c.label}{c.amount ? ` — ${fmt(c.amount)} HT` : ""}</option>)}
          </select>
          {CONTRACTS.find(c => c.id === contract)?.custom && (
            <input type="number" placeholder="Montant HT" value={custom} onChange={e => setCustom(e.target.value)} style={{ padding: "8px 12px", borderRadius: 6, border: "1.5px solid #ddd", fontSize: 13, fontFamily: "inherit", width: 130 }} />
          )}
          <button onClick={onAdd} style={{ padding: "8px 18px", borderRadius: 6, border: "none", background: color, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ajouter</button>
        </div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {OPTIONS.map(o => {
            const on = opts.includes(o.id);
            return <button key={o.id} onClick={() => toggleOpt(o.id, opts, setOpts)} style={{ padding: "5px 10px", borderRadius: 5, border: `1.5px solid ${on ? color : "#e5e5e5"}`, background: on ? `${color}14` : "transparent", color: on ? color : "#888", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{on ? "✓ " : ""}{o.label} ({fmt(o.amount)})</button>;
          })}
        </div>
      </div>
    </div>
  );

  return (
    <div>
      <div style={{ display: "flex", gap: 6, background: "#f0efed", borderRadius: 8, padding: 3, marginBottom: 20, width: "fit-content" }}>
        {[{ key: "mensuel", label: "Calcul mensuel" }, { key: "simulateur", label: "Simulateur annuel" }].map(t => (
          <button key={t.key} onClick={() => setSubTab(t.key)} className={`tab-btn ${subTab === t.key ? "active" : ""}`}>{t.label}</button>
        ))}
      </div>

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 20 }}>
        <div style={{ flex: 1, minWidth: 200, background: "#fff", border: "1px solid #e5e5e5", borderLeft: "4px solid #2d6a4f", borderRadius: "0 8px 8px 0", padding: "12px 16px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#2d6a4f", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>New Business</div>
          <div style={{ fontSize: 24, fontWeight: 800 }}>10%<span style={{ fontSize: 13, fontWeight: 500, color: "#999", marginLeft: 6 }}>du CA signé</span></div>
        </div>
        <div style={{ flex: 1, minWidth: 200, background: "#fff", border: "1px solid #e5e5e5", borderLeft: "4px solid #1a5fb4", borderRadius: "0 8px 8px 0", padding: "12px 16px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#1a5fb4", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Renew Année 1</div>
          <div style={{ fontSize: 24, fontWeight: 800 }}>5%<span style={{ fontSize: 13, fontWeight: 500, color: "#999", marginLeft: 6 }}>du CA renouvelé</span></div>
        </div>
      </div>

      {subTab === "mensuel" && (
        <div>
          <EntryForm color="#2d6a4f" label="New Business — 10% commission" contract={selContract} setContract={setSelContract} custom={customAmount} setCustom={setCustomAmount} opts={selOptions} setOpts={setSelOptions} onAdd={addEntry} />
          {entries.map(e => (
            <div key={e.id} style={{ background: "#fff", border: "1px solid #eee", borderLeft: "4px solid #2d6a4f", borderRadius: "0 8px 8px 0", padding: "12px 16px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600 }}>{e.contract}</div>{e.options.length > 0 && <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>+ {e.options.map(o => o.label).join(", ")}</div>}</div>
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 700 }}>{fmt(e.total)} HT</div><div style={{ fontSize: 12, fontWeight: 700, color: "#2d6a4f" }}>→ {fmtDec(e.commission)}</div></div>
              <button onClick={() => setEntries(entries.filter(x => x.id !== e.id))} style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid #eee", background: "transparent", cursor: "pointer", fontSize: 13, color: "#ccc" }}>✕</button>
            </div>
          ))}
          {entries.length === 0 && <div style={{ textAlign: "center", padding: "20px 0", color: "#ccc", fontSize: 13 }}>Aucune vente new business ajoutée</div>}

          <EntryForm color="#1a5fb4" label="Renouvellements Année 1 — 5% commission" contract={selRenewContract} setContract={setSelRenewContract} custom={customRenewAmount} setCustom={setCustomRenewAmount} opts={selRenewOptions} setOpts={setSelRenewOptions} onAdd={addRenew} />
          {renewEntries.map(e => (
            <div key={e.id} style={{ background: "#fff", border: "1px solid #eee", borderLeft: "4px solid #1a5fb4", borderRadius: "0 8px 8px 0", padding: "12px 16px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600 }}>{e.contract}</div>{e.options.length > 0 && <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>+ {e.options.map(o => o.label).join(", ")}</div>}</div>
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 700 }}>{fmt(e.total)} HT</div><div style={{ fontSize: 12, fontWeight: 700, color: "#1a5fb4" }}>→ {fmtDec(e.commission)}</div></div>
              <button onClick={() => setRenewEntries(renewEntries.filter(x => x.id !== e.id))} style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid #eee", background: "transparent", cursor: "pointer", fontSize: 13, color: "#ccc" }}>✕</button>
            </div>
          ))}
          {renewEntries.length === 0 && <div style={{ textAlign: "center", padding: "20px 0", color: "#ccc", fontSize: 13 }}>Aucun renouvellement année 1 ajouté</div>}

          <EntryForm color="#9333ea" label="Renouvellements Année 3 — 3% commission" contract={selRenew3Contract} setContract={setSelRenew3Contract} custom={customRenew3Amount} setCustom={setCustomRenew3Amount} opts={selRenew3Options} setOpts={setSelRenew3Options} onAdd={addRenew3} />
          {renew3Entries.map(e => (
            <div key={e.id} style={{ background: "#fff", border: "1px solid #eee", borderLeft: "4px solid #9333ea", borderRadius: "0 8px 8px 0", padding: "12px 16px", marginBottom: 6, display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ flex: 1 }}><div style={{ fontSize: 14, fontWeight: 600 }}>{e.contract}</div>{e.options.length > 0 && <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>+ {e.options.map(o => o.label).join(", ")}</div>}</div>
              <div style={{ textAlign: "right" }}><div style={{ fontSize: 13, fontWeight: 700 }}>{fmt(e.total)} HT</div><div style={{ fontSize: 12, fontWeight: 700, color: "#9333ea" }}>→ {fmtDec(e.commission)}</div></div>
              <button onClick={() => setRenew3Entries(renew3Entries.filter(x => x.id !== e.id))} style={{ width: 26, height: 26, borderRadius: 6, border: "1px solid #eee", background: "transparent", cursor: "pointer", fontSize: 13, color: "#ccc" }}>✕</button>
            </div>
          ))}
          {renew3Entries.length === 0 && <div style={{ textAlign: "center", padding: "20px 0", color: "#ccc", fontSize: 13 }}>Aucun renouvellement année 3 ajouté</div>}

          <div style={{ background: "#fff", border: "2px solid #d14718", borderRadius: 12, overflow: "hidden", marginTop: 20 }}>
            <div style={{ background: "#d14718", padding: "12px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#fff", textTransform: "uppercase", letterSpacing: 1 }}>Total commissions du mois</span>
              <span style={{ fontSize: 26, fontWeight: 800, color: "#fff" }}>{fmtDec(totalComm)}</span>
            </div>
            <div style={{ padding: "14px 20px", display: "flex", gap: 24, flexWrap: "wrap" }}>
              <div><div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>CA New Business</div><div style={{ fontSize: 16, fontWeight: 700, color: "#2d6a4f" }}>{fmt(newCA)} <span style={{ fontSize: 12, color: "#999", fontWeight: 500 }}>→ {fmtDec(newComm)}</span></div></div>
              <div><div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>CA Renew An 1</div><div style={{ fontSize: 16, fontWeight: 700, color: "#1a5fb4" }}>{fmt(renewCA)} <span style={{ fontSize: 12, color: "#999", fontWeight: 500 }}>→ {fmtDec(renewComm)}</span></div></div>
              <div><div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>CA Renew An 3</div><div style={{ fontSize: 16, fontWeight: 700, color: "#9333ea" }}>{fmt(renew3CA)} <span style={{ fontSize: 12, color: "#999", fontWeight: 500 }}>→ {fmtDec(renew3Comm)}</span></div></div>
              <div style={{ marginLeft: "auto", textAlign: "right" }}><div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>Brut estimé (fixe 2 708€ + var.)</div><div style={{ fontSize: 20, fontWeight: 800 }}>{fmt(2708 + totalComm)}</div></div>
            </div>
          </div>
        </div>
      )}

      {subTab === "simulateur" && (
        <div>
          <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, padding: 20, marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#d14718", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>Paramètres de simulation</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
              {[{ label: "Fixe brut mensuel", val: fixe, set: setFixe, min: 1500, max: 4000, step: 50, color: "#1a1a1a" },
                { label: "CA New Business / mois", val: simNewPerMonth, set: setSimNewPerMonth, min: 0, max: 60000, step: 1000, color: "#2d6a4f" },
                { label: "CA Renew au démarrage", val: simRenewStart, set: setSimRenewStart, min: 0, max: 40000, step: 500, color: "#1a5fb4" },
                { label: "Croissance renew Y1 / mois", val: simRenewGrowth, set: setSimRenewGrowth, min: 0, max: 10000, step: 250, color: "#1a5fb4", prefix: "+" },
                { label: "CA Renew Y3 au démarrage", val: simRenew3Start, set: setSimRenew3Start, min: 0, max: 40000, step: 500, color: "#9333ea" },
                { label: "Croissance renew Y3 / mois", val: simRenew3Growth, set: setSimRenew3Growth, min: 0, max: 10000, step: 250, color: "#9333ea", prefix: "+" },
              ].map((p,i) => (
                <div key={i}>
                  <label style={{ fontSize: 12, fontWeight: 600, color: "#666", display: "block", marginBottom: 6 }}>{p.label}</label>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <input type="range" min={p.min} max={p.max} step={p.step} value={p.val} onChange={e => p.set(Number(e.target.value))} style={{ flex: 1 }} />
                    <span style={{ fontSize: 15, fontWeight: 700, color: p.color, minWidth: 80, textAlign: "right" }}>{p.prefix||""}{fmt(p.val)}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(4, 1fr)" }}>
            {[{ label: "Variable annuel", value: fmt(simData.annualVariable), color: "#d14718" },
              { label: "Package brut annuel", value: fmt(simData.annualBrut), color: "#1a1a1a" },
              { label: "Brut moyen / mois", value: fmt(Math.round(simData.annualBrut / 12)), color: "#1a1a1a" },
              { label: "Net estimé / mois", value: fmt(Math.round(simData.annualBrut / 12 * 0.78)), color: "#2d6a4f" },
            ].map((k,i) => (
              <div key={i} className="kpi-card"><div className="kpi-label">{k.label}</div><div className="kpi-value" style={{ color: k.color }}>{k.value}</div></div>
            ))}
          </div>
          <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, padding: 20, marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>Commission mensuelle — projection 12 mois</div>
            <div className="bar-chart">
              {simData.months.map((m,i) => {
                const hN = (m.commNew / maxComm) * 160; const hR = (m.commRenew / maxComm) * 160; const hR3 = (m.commRenew3 / maxComm) * 160;
                return <div key={i} className="bar-col">
                  <div className="bar-value">{fmtK(m.commTotal)}</div>
                  <div style={{ width: "70%", height: hR3, background: "#9333ea", borderRadius: "4px 4px 0 0", minHeight: hR3 > 0 ? 2 : 0 }} />
                  <div style={{ width: "70%", height: hR, background: "#1a5fb4", borderRadius: hR3 > 0 ? 0 : "4px 4px 0 0", minHeight: hR > 0 ? 2 : 0 }} />
                  <div style={{ width: "70%", height: hN, background: "#2d6a4f", borderRadius: (hR > 0 || hR3 > 0) ? 0 : "4px 4px 0 0" }} />
                  <div className="bar-label">{m.month}</div>
                </div>;
              })}
            </div>
            <div style={{ display: "flex", gap: 20, justifyContent: "center", marginTop: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#666" }}><div style={{ width: 12, height: 12, borderRadius: 3, background: "#2d6a4f" }} /> New business (10%)</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#666" }}><div style={{ width: 12, height: 12, borderRadius: 3, background: "#1a5fb4" }} /> Renew an 1 (5%)</div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: "#666" }}><div style={{ width: 12, height: 12, borderRadius: 3, background: "#9333ea" }} /> Renew an 3 (3%)</div>
            </div>
          </div>
          <div style={{ marginTop: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 10 }}>Scénarios rapides</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {[{ label: "Junior (iso Virgile)", n: 12000, rs: 0, rg: 2000, r3s: 0, r3g: 0, f: 2708 },
                { label: "Confirmé", n: 20000, rs: 5000, rg: 3000, r3s: 2000, r3g: 1000, f: 2708 },
                { label: "Senior", n: 30000, rs: 10000, rg: 4000, r3s: 8000, r3g: 2000, f: 3000 },
                { label: "Top performer", n: 40000, rs: 15000, rg: 5000, r3s: 15000, r3g: 3000, f: 3000 },
              ].map(p => <button key={p.label} onClick={() => { setSimNewPerMonth(p.n); setSimRenewStart(p.rs); setSimRenewGrowth(p.rg); setSimRenew3Start(p.r3s); setSimRenew3Growth(p.r3g); setFixe(p.f); }} style={{ padding: "8px 16px", borderRadius: 6, border: "1.5px solid #e5e5e5", background: "#fff", color: "#666", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{p.label}</button>)}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
function ClientsTab() {
  const data = DASHBOARD_DATA;
  const [view, setView] = useState("overview");
  const [search, setSearch] = useState("");
  const [sortKey, setSortKey] = useState("ca_ht");
  const [sortAsc, setSortAsc] = useState(false);
  const [filterEx, setFilterEx] = useState("all");
  const [page, setPage] = useState(0);
  const [selectedClient, setSelectedClient] = useState(null);
  const perPage = 50;

  const toggleSort = (key) => {
    if (sortKey === key) setSortAsc(!sortAsc);
    else { setSortKey(key); setSortAsc(false); }
  };

  const filteredClients = useMemo(() => {
    let list = [...data.clients];
    if (search) {
      const s = search.toLowerCase();
      list = list.filter(c => c.name.toLowerCase().includes(s) || c.id.toLowerCase().includes(s));
    }
    if (filterEx !== "all") {
      if (filterEx === "fidele") list = list.filter(c => c.nb_ex >= 3);
      else if (filterEx === "recurrent") list = list.filter(c => c.nb_ex === 2);
      else if (filterEx === "ponctuel") list = list.filter(c => c.nb_ex === 1);
    }
    list.sort((a, b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return sortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    return list;
  }, [data.clients, search, filterEx, sortKey, sortAsc]);

  const pageClients = filteredClients.slice(page * perPage, (page + 1) * perPage);
  const totalPages = Math.ceil(filteredClients.length / perPage);

  const totalCA = data.exercice_summary.reduce((s, e) => s + e.ca_ht, 0);
  const lastEx = data.exercice_summary[data.exercice_summary.length - 1];
  const prevEx = data.exercice_summary[data.exercice_summary.length - 2];
  const variation = prevEx ? (lastEx.ca_ht - prevEx.ca_ht) / prevEx.ca_ht : 0;
  const nbFideles = data.clients.filter(c => c.nb_ex >= 3).length;
  const nbRecurrents = data.clients.filter(c => c.nb_ex === 2).length;
  const nbPonctuels = data.clients.filter(c => c.nb_ex === 1).length;

  const maxMonthCA = Math.max(...data.monthly.map(m => m.ca_ht));

  const exportCSV = () => {
    const headers = ["Compte", "Client", "Produit", "Nb Exercices", "Nb Factures", "CA HT Total", ...data.exercices, "Première Facture", "Dernière Facture"];
    const rows = filteredClients.map(c => [c.id, c.name, c.produit, c.nb_ex, c.nb_factures, c.ca_ht, ...data.exercices.map(ex => c[ex] || 0), c.first, c.last]);
    const csv = [headers.join(";"), ...rows.map(r => r.join(";"))].join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "pmebtp_clients.csv"; a.click();
  };

  return (
    <div>
      {selectedClient && (
        <>
          <div className="side-panel-overlay" onClick={() => setSelectedClient(null)} />
          <div className="side-panel">
            <div className="side-panel-header">
              <button className="side-panel-close" onClick={() => setSelectedClient(null)}>×</button>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: "#d14718", marginBottom: 4 }}>
                {selectedClient.nb_ex >= 3 ? "Client Fidèle" : selectedClient.nb_ex === 2 ? "Client Récurrent" : "Client Ponctuel"}
              </div>
              <div style={{ fontFamily: "'Inter', sans-serif", fontSize: 22, fontWeight: 700, color: "#111", lineHeight: 1.2 }}>
                {selectedClient.name}
              </div>
              <div style={{ fontSize: 12, color: "#888", marginTop: 4 }}>Compte {selectedClient.id}</div>
            </div>
            <div className="side-panel-body">
              <div className="sp-section">
                <div className="sp-section-title">Chiffre d'affaires</div>
                <div className="sp-row"><span className="sp-row-label">CA HT Total</span><span className="sp-row-value" style={{ color: "#d14718", fontSize: 18, fontFamily: "'Inter', sans-serif" }}>{fmt(selectedClient.ca_ht)}</span></div>
                <div className="sp-row"><span className="sp-row-label">CA TTC Total</span><span className="sp-row-value">{fmt(selectedClient.ca_ttc)}</span></div>
                <div className="sp-row"><span className="sp-row-label">Panier moyen HT</span><span className="sp-row-value">{fmt(selectedClient.ca_ht / selectedClient.nb_factures)}</span></div>
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Historique par exercice</div>
                <div className="sp-bar-container">
                  {data.exercices.map(ex => {
                    const val = selectedClient[ex] || 0;
                    const maxEx = Math.max(...data.exercices.map(e => selectedClient[e] || 0), 1);
                    const pct = (val / maxEx) * 100;
                    return (
                      <div key={ex} className="sp-bar-row">
                        <div style={{ fontSize: 11, color: "#666", minWidth: 72, fontWeight: 600 }}>{ex}</div>
                        <div style={{ flex: 1, background: "#f0f0f0", borderRadius: 4, height: 22, position: "relative" }}>
                          <div className="sp-bar" style={{ width: pct + "%", background: val > 0 ? "#d14718" : "transparent", height: 22, display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 8 }}>
                            {val > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: pct > 40 ? "#fff" : "#d14718", position: pct > 40 ? "relative" : "absolute", right: pct > 40 ? 0 : -60 }}>{fmt(val)}</span>}
                          </div>
                        </div>
                        {val === 0 && <span style={{ fontSize: 11, color: "#ccc", marginLeft: 4 }}>—</span>}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Détails</div>
                <div className="sp-row"><span className="sp-row-label">Nombre de factures</span><span className="sp-row-value">{selectedClient.nb_factures}</span></div>
                <div className="sp-row"><span className="sp-row-label">Exercices actifs</span><span className="sp-row-value">{selectedClient.nb_ex} / {data.exercices.length}</span></div>
                <div className="sp-row"><span className="sp-row-label">Produit principal</span><span className="sp-row-value">{selectedClient.produit}</span></div>
                <div className="sp-row"><span className="sp-row-label">Première facture</span><span className="sp-row-value">{selectedClient.first}</span></div>
                <div className="sp-row"><span className="sp-row-label">Dernière facture</span><span className="sp-row-value">{selectedClient.last}</span></div>
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Évolution</div>
                {(() => {
                  const exVals = data.exercices.map(ex => ({ ex, val: selectedClient[ex] || 0 }));
                  const active = exVals.filter(e => e.val > 0);
                  if (active.length < 2) return <div style={{ fontSize: 12, color: "#888" }}>Pas assez de données pour calculer la tendance</div>;
                  const last = active[active.length - 1];
                  const prev = active[active.length - 2];
                  const growth = (last.val - prev.val) / prev.val;
                  return (
                    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: 12, background: growth >= 0 ? "#f0fdf4" : "#fef2f2", borderRadius: 8 }}>
                      <div style={{ fontSize: 28 }}>{growth >= 0 ? "📈" : "📉"}</div>
                      <div>
                        <div style={{ fontWeight: 700, color: growth >= 0 ? "#16a34a" : "#dc2626", fontSize: 16 }}>
                          {growth >= 0 ? "+" : ""}{(growth * 100).toFixed(0)}%
                        </div>
                        <div style={{ fontSize: 11, color: "#666" }}>
                          {prev.ex} → {last.ex}
                        </div>
                      </div>
                    </div>
                  );
                })()}
              </div>

              <div className="sp-section">
                <div className="sp-section-title">Historique des factures</div>
                {selectedClient.invoices && selectedClient.invoices.length > 0 ? (
                  <div style={{ maxHeight: 300, overflowY: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                      <thead>
                        <tr style={{ borderBottom: "2px solid #e5e5e5" }}>
                          <th style={{ padding: "6px 8px", textAlign: "left", fontSize: 10, textTransform: "uppercase", color: "#888", fontWeight: 700 }}>Date</th>
                          <th style={{ padding: "6px 8px", textAlign: "right", fontSize: 10, textTransform: "uppercase", color: "#888", fontWeight: 700 }}>Montant TTC</th>
                          <th style={{ padding: "6px 8px", textAlign: "left", fontSize: 10, textTransform: "uppercase", color: "#888", fontWeight: 700 }}>Réf</th>
                          <th style={{ padding: "6px 8px", textAlign: "left", fontSize: 10, textTransform: "uppercase", color: "#888", fontWeight: 700 }}>Libellé</th>
                        </tr>
                      </thead>
                      <tbody>
                        {selectedClient.invoices.map((inv, idx) => (
                          <tr key={idx} style={{ borderBottom: "1px solid #f0f0f0" }}>
                            <td style={{ padding: "6px 8px", whiteSpace: "nowrap", color: "#666" }}>{inv.date}</td>
                            <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 600, fontFamily: "monospace", color: "#d14718" }}>{fmt(inv.amount)}</td>
                            <td style={{ padding: "6px 8px", color: "#888", fontSize: 10 }}>{inv.ref}</td>
                            <td style={{ padding: "6px 8px", color: "#666", fontSize: 10, maxWidth: 150, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{inv.desc}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                ) : (
                  <div style={{ fontSize: 12, color: "#888" }}>Aucune facture détaillée disponible</div>
                )}
              </div>

              {(() => {
                const lastDate = new Date(selectedClient.last);
                const now = new Date();
                const months = (now.getFullYear() - lastDate.getFullYear()) * 12 + now.getMonth() - lastDate.getMonth();
                if (months > 12) return (
                  <div style={{ padding: 12, background: "#fff7ed", border: "1px solid #fed7aa", borderRadius: 8, marginTop: 8 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#c2410c" }}>⚠️ Client inactif depuis {months} mois</div>
                    <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>Dernière facture : {selectedClient.last}</div>
                  </div>
                );
                return null;
              })()}
            </div>
          </div>
        </>
      )}
      <div style={{ display: "flex", gap: 6, background: "#f0efed", borderRadius: 8, padding: 3, marginBottom: 20, width: "fit-content" }}>
        {[{ key: "overview", label: "Vue d'ensemble" }, { key: "clients", label: "Fiches Clients" }, { key: "matrix", label: "Matrice Mensuelle" }].map(t => (
          <button key={t.key} onClick={() => { setView(t.key); setPage(0); }} className={`tab-btn ${view === t.key ? "active" : ""}`}>{t.label}</button>
        ))}
      </div>

      {view === "overview" && (
        <div>
          {/* KPIs */}
          <div className="kpi-grid" style={{ gridTemplateColumns: "repeat(5, 1fr)" }}>
            <div className="kpi-card"><div className="kpi-label">CA HT Total (3 ex.)</div><div className="kpi-value" style={{ color: "#d14718" }}>{fmt(totalCA)}</div></div>
            <div className="kpi-card"><div className="kpi-label">Dernier exercice</div><div className="kpi-value">{fmt(lastEx.ca_ht)}</div><div className="kpi-sub" style={{ color: variation < 0 ? "#c62828" : "#2d6a4f" }}>{variation >= 0 ? "+" : ""}{fmtPct(variation)}</div></div>
            <div className="kpi-card"><div className="kpi-label">Clients uniques</div><div className="kpi-value">{data.clients.length}</div></div>
            <div className="kpi-card"><div className="kpi-label">Fidèles (3+ ex.)</div><div className="kpi-value" style={{ color: "#2d6a4f" }}>{nbFideles}</div><div className="kpi-sub">{fmtPct(nbFideles / data.clients.length)} du total</div></div>
            <div className="kpi-card"><div className="kpi-label">Panier moyen HT</div><div className="kpi-value">{fmt(lastEx.panier_moyen)}</div></div>
          </div>

          {/* Exercice cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
            {data.exercice_summary.map((ex, i) => {
              const prev = i > 0 ? data.exercice_summary[i-1] : null;
              const v = prev ? (ex.ca_ht - prev.ca_ht) / prev.ca_ht : null;
              return <div key={ex.exercice} style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, padding: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#d14718", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{ex.exercice}</div>
                <div style={{ fontSize: 24, fontWeight: 800, marginBottom: 4 }}>{fmt(ex.ca_ht)}</div>
                {v !== null && <div style={{ fontSize: 12, fontWeight: 700, color: v < 0 ? "#c62828" : "#2d6a4f", marginBottom: 8 }}>{v >= 0 ? "+" : ""}{fmtPct(v)} vs N-1</div>}
                <div style={{ display: "flex", gap: 16, fontSize: 12, color: "#888" }}>
                  <span>{ex.nb_factures} factures</span>
                  <span>{ex.nb_avoirs} avoirs</span>
                  <span>{ex.nb_clients} clients</span>
                </div>
              </div>;
            })}
          </div>

          {/* Monthly bar chart */}
          <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, padding: 20, marginBottom: 24 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>CA HT mensuel — 36 mois</div>
            <div className="bar-chart" style={{ height: 220 }}>
              {data.monthly.map((m, i) => {
                const h = (m.ca_ht / maxMonthCA) * 180;
                const isNewYear = i === 0 || m.month.slice(0,4) !== data.monthly[i-1]?.month.slice(0,4);
                const exColors = { "2022": "#2d6a4f", "2023": "#1a5fb4", "2024": "#d14718", "2025": "#8b5cf6" };
                const yr = m.month.slice(0,4);
                return <div key={m.month} className="bar-col">
                  <div className="bar-value">{fmtK(m.ca_ht)}</div>
                  <div style={{ width: "80%", height: Math.max(h, 2), background: exColors[yr] || "#999", borderRadius: "3px 3px 0 0" }} />
                  <div className="bar-label">{m.month.slice(5)}/{m.month.slice(2,4)}</div>
                </div>;
              })}
            </div>
          </div>

          {/* Client recurrence */}
          <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, padding: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>Répartition clients</div>
            <div style={{ display: "flex", gap: 20 }}>
              {[{ label: "Fidèles (3+ ex.)", n: nbFideles, color: "#2d6a4f", bg: "#e2efda" },
                { label: "Récurrents (2 ex.)", n: nbRecurrents, color: "#b8860b", bg: "#fff2cc" },
                { label: "Ponctuels (1 ex.)", n: nbPonctuels, color: "#c62828", bg: "#fce4ec" },
              ].map(seg => (
                <div key={seg.label} style={{ flex: 1, background: seg.bg, borderRadius: 10, padding: 16, textAlign: "center" }}>
                  <div style={{ fontSize: 32, fontWeight: 800, color: seg.color }}>{seg.n}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: seg.color, marginTop: 4 }}>{seg.label}</div>
                  <div style={{ fontSize: 11, color: "#999", marginTop: 2 }}>{fmtPct(seg.n / data.clients.length)}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {view === "clients" && (
        <div>
          <div style={{ display: "flex", gap: 12, marginBottom: 16, alignItems: "center" }}>
            <input className="search-input" placeholder="Rechercher un client..." value={search} onChange={e => { setSearch(e.target.value); setPage(0); }} style={{ maxWidth: 300 }} />
            <select value={filterEx} onChange={e => { setFilterEx(e.target.value); setPage(0); }} style={{ padding: "8px 12px", borderRadius: 6, border: "1.5px solid #ddd", fontSize: 12, fontFamily: "inherit", fontWeight: 600 }}>
              <option value="all">Tous les clients ({data.clients.length})</option>
              <option value="fidele">Fidèles 3+ ex. ({nbFideles})</option>
              <option value="recurrent">Récurrents 2 ex. ({nbRecurrents})</option>
              <option value="ponctuel">Ponctuels 1 ex. ({nbPonctuels})</option>
            </select>
            <div style={{ marginLeft: "auto", fontSize: 12, color: "#888" }}>{filteredClients.length} clients</div>
            <button className="export-btn" onClick={exportCSV}>Exporter CSV</button>
          </div>
          <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, overflow: "hidden" }}>
            <div style={{ overflowX: "auto" }}>
              <table className="client-table">
                <thead><tr>
                  <th style={{ cursor: "pointer" }} onClick={() => toggleSort("name")}>Client {sortKey === "name" ? (sortAsc ? "↑" : "↓") : ""}</th>
                  <th>Statut</th>
                  <th className="right" style={{ cursor: "pointer" }} onClick={() => toggleSort("ca_ht")}>CA HT Total {sortKey === "ca_ht" ? (sortAsc ? "↑" : "↓") : ""}</th>
                  {data.exercices.map(ex => <th key={ex} className="right" style={{ cursor: "pointer" }} onClick={() => toggleSort(ex)}>{ex} {sortKey === ex ? (sortAsc ? "↑" : "↓") : ""}</th>)}
                  <th className="right" style={{ cursor: "pointer" }} onClick={() => toggleSort("nb_factures")}>Fact. {sortKey === "nb_factures" ? (sortAsc ? "↑" : "↓") : ""}</th>
                  <th>Produit</th>
                  <th className="right">Dernière fact.</th>
                </tr></thead>
                <tbody>
                  {pageClients.map(c => (
                    <tr key={c.id} onClick={() => setSelectedClient(c)} style={{ cursor: "pointer", transition: "background 0.15s" }} onMouseOver={e => e.currentTarget.style.background="#fdf8f6"} onMouseOut={e => e.currentTarget.style.background=""}>
                      <td style={{ fontWeight: 600, color: "#d14718" }}>{c.name}</td>
                      <td><span className={`badge ${c.nb_ex >= 3 ? "badge-fidele" : c.nb_ex === 2 ? "badge-recurrent" : "badge-ponctuel"}`}>{c.nb_ex >= 3 ? "Fidèle" : c.nb_ex === 2 ? "Récurrent" : "Ponctuel"}</span></td>
                      <td className="right" style={{ fontWeight: 700 }}>{fmt(c.ca_ht)}</td>
                      {data.exercices.map(ex => <td key={ex} className="right" style={{ color: c[ex] > 0 ? "#1a1a1a" : "#ddd" }}>{c[ex] > 0 ? fmt(c[ex]) : "—"}</td>)}
                      <td className="right">{c.nb_factures}</td>
                      <td style={{ fontSize: 11, color: "#888" }}>{c.produit.replace("PRESTATIONS DE SERVICES ", "Services").replace("ESPACE ANNUALISE", "Espace Ann.")}</td>
                      <td className="right" style={{ fontSize: 11, color: "#888" }}>{c.last}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          {totalPages > 1 && (
            <div className="pagination">
              <button disabled={page === 0} onClick={() => setPage(page - 1)}>←</button>
              {Array.from({ length: Math.min(totalPages, 10) }, (_, i) => {
                const p = totalPages <= 10 ? i : (page < 5 ? i : (page >= totalPages - 5 ? totalPages - 10 + i : page - 5 + i));
                return <button key={p} className={p === page ? "active" : ""} onClick={() => setPage(p)}>{p + 1}</button>;
              })}
              <button disabled={page >= totalPages - 1} onClick={() => setPage(page + 1)}>→</button>
            </div>
          )}
        </div>
      )}

      {view === "matrix" && (
        <div style={{ background: "#fff", border: "1.5px solid #e5e5e5", borderRadius: 12, overflow: "hidden" }}>
          <div style={{ overflowX: "auto" }}>
            <table className="matrix-table">
              <thead><tr>
                <th style={{ textAlign: "left" }}>Exercice</th>
                {data.month_labels.map(m => <th key={m}>{m}</th>)}
                <th style={{ background: "rgba(209,71,24,0.08)" }}>Total</th>
              </tr></thead>
              <tbody>
                {data.matrix.map(row => {
                  const total = row.months.reduce((s, v) => s + v, 0);
                  return <tr key={row.exercice}>
                    <td style={{ textAlign: "left", fontWeight: 700 }}>{row.exercice}</td>
                    {row.months.map((v, i) => <td key={i}>{fmt(v)}</td>)}
                    <td className="total-col">{fmt(total)}</td>
                  </tr>;
                })}
                <tr className="total-row">
                  <td style={{ textAlign: "left" }}>TOTAL</td>
                  {data.month_labels.map((_, i) => {
                    const sum = data.matrix.reduce((s, r) => s + r.months[i], 0);
                    return <td key={i}>{fmt(sum)}</td>;
                  })}
                  <td className="total-col" style={{ color: "#d14718" }}>{fmt(data.matrix.reduce((s, r) => s + r.months.reduce((a, v) => a + v, 0), 0))}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function ComptaTab() {
  const fmt = n => new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(n);
  const pctFmt = (current, previous) => previous === 0 ? 0 : ((current / previous) * 100).toFixed(1);
  
  const data = SIG_DATA;
  const months = data.monthly.months;
  const monthsSig = data.monthly.sig;
  const monthsRev = data.monthly.revenue_breakdown;
  const cum8m = data.cumulative_8m;
  const n1 = data.n_minus_1;
  
  const cardStyle = { background: "#fff", borderRadius: 12, border: "1.5px solid #e5e5e5", padding: 20, marginBottom: 16 };
  const kpiStyle = { textAlign: "center", flex: 1, padding: 12 };
  const kpiVal = { fontSize: 28, fontWeight: 800, color: "#111", fontFamily: "'Inter', sans-serif" };
  const kpiLabel = { fontSize: 11, color: "#888", marginTop: 4, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.5px" };
  const kpiSubtitle = { fontSize: 10, color: "#aaa", marginTop: 2 };

  // Calculate totals for Charges
  const ca8m = cum8m["Production vendue"];
  const charges8m = (monthsSig["Salaires"].reduce((s, v) => s + v, 0) + 
                     monthsSig["Charges sociales"].reduce((s, v) => s + v, 0) + 
                     monthsSig["Conso tiers"].reduce((s, v) => s + v, 0) + 
                     monthsSig["Sous-traitance"].reduce((s, v) => s + v, 0));
  const ebe8m = cum8m["EBE"];
  const rn8m = cum8m["Résultat net"];
  const caf8m = cum8m["CAF"];
  
  const caN1 = n1["Production vendue"];
  const ebeN1 = n1["EBE"];
  const rnN1 = n1["Résultat net"];
  const cafN1 = n1["CAF"];

  return React.createElement("div", null,
    // KPI Cards

// Error Boundary
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error("React error:", error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement("div", { style: { padding: 40, textAlign: "center" } },
        React.createElement("h2", { style: { color: "#d14718" } }, "Erreur de rendu"),
        React.createElement("pre", { style: { fontSize: 12, color: "#666", whiteSpace: "pre-wrap" } }, String(this.state.error))
      );
    }
    return this.props.children;
  }
}
